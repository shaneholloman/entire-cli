version: "2"
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
linters:
  default: standard
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - copyloopvar
    - decorder
    - durationcheck
    - embeddedstructfieldcheck
    - errchkjson
    - errname
    - errorlint
    - exhaustive
    - exptostd
    - forbidigo
    - forcetypeassert
    - gocheckcompilerdirectives
    - gochecknoinits
    - gochecksumtype
    - goconst
    - gocritic
    - gosec
    - govet
    - grouper
    - iface
    - importas
    - inamedparam
    - ineffassign
    - intrange
    - ireturn
    - loggercheck
    - maintidx
    - makezero
    - mirror
    - misspell
    - musttag
    - nakedret
    - nilerr
    - nilnesserr
    - nilnil
    - noctx
    - nolintlint
    - nosprintfhostport
    - perfsprint
    - promlinter
    - protogetter
    - reassign
    - recvcheck
    - revive
    - sloglint
    - spancheck
    - staticcheck
    - tagalign
    - testableexamples
    - testifylint
    - tparallel
    - unconvert
    - unparam
    - unused
    - usestdlibvars
    - usetesting
    - wastedassign
    - whitespace
    - wrapcheck
  settings:
    gosec:
      excludes:
        - G204 # subprocess with variables is expected for git/opencode CLI wrappers
        - G702 # command injection via taint - controlled CLI inputs
        - G705 # XSS not applicable to CLI stderr output
    dupl:
      # Token threshold for duplication detection
      # Lower = more sensitive (catches smaller duplicates)
      # Default is 150. We use 75 for lint (blocks CI), `mise run dup` uses 50 (advisory)
      threshold: 75
    errcheck:
      check-type-assertions: true
      check-blank: true
    wrapcheck:
      # Errors from the generated control-plane client are mapped centrally
      # by renderCoreError (cmd/entire/cli/corecmd.go), which extracts the
      # RFC 7807 problem detail via errors.As. Per-call-site wrapping would
      # only be unwrapped again, so the command closures return coreapi
      # errors verbatim.
      ignore-package-globs:
        - github.com/entireio/cli/internal/coreapi
    forbidigo:
      analyze-types: true
      forbid:
        - pattern: '^os\.Getwd$'
          msg: "os.Getwd() breaks when running from subdirectories - use paths.RepoRoot() for git-relative paths"
          pkg: '^os$'
        - pattern: '^.*\.Reset$'
          msg: "go-git Reset deletes .gitignored dirs - use HardResetWithProtection() from common.go"
          pkg: 'github\.com/go-git/go-git'
        - pattern: '^.*\.Checkout$'
          msg: "go-git Checkout deletes .gitignored dirs - use CheckoutBranch() from git_operations.go"
          pkg: 'github\.com/go-git/go-git'
    govet:
      enable-all: true
      disable:
        - fieldalignment
        - shadow
    ireturn:
      allow:
        - anon
        - error
        - empty
        - stdlib
        - charm.land/bubbletea/v2.Model
        - grpc.DialOption
        - github.com/entireio/cli/cmd/entire/cli/summarize.Generator
        - github.com/entireio/cli/cmd/entire/cli/agent\..+
        - github.com/entireio/cli/cmd/entire/cli/agent/spawn.Spawner
        - github.com/entireio/cli/cmd/entire/cli/review/types.Process
        - github.com/entireio/cli/cmd/entire/cli/review/types.AgentReviewer
        - github.com/entireio/cli/cmd/entire/cli/review.SynthesisProvider
        - github.com/entireio/cli/cmd/entire/cli/checkpoint.CommittedReader
        - github.com/entireio/cli/cmd/entire/cli/strategy.Strategy
        - github.com/go-git/go-git/v6/x/plugin.Signer
        - github.com/go-git/go-git/v6/plumbing/storer.ReferenceIter
        - github.com/go-git/go-git/v6/plumbing.EncodedObject
        - github.com/go-git/go-git/v6/storage.Storer
        - github.com/go-git/go-git/v6/plumbing/storer.EncodedObjectIter
        - github.com/entireio/cli/e2e/agents.Session
        - github.com/go-git/go-billy/v6.File
        - github.com/go-git/go-billy/v6.Filesystem
        - golang.org/x/crypto/ssh/agent.Agent
    nolintlint:
      require-explanation: true
      require-specific: true
    sloglint:
      attr-only: true
    testifylint:
      enable-all: true
    unparam:
      check-exported: true
  exclusions:
    presets:
      - comments
      - std-error-handling
    rules:
      - path: _test\.go
        linters:
          - gosec
          - wrapcheck
          - forbidigo
      - path: ^e2e/
        linters:
          - errcheck
          - gochecknoinits
          - goconst
          - gosec
          - noctx
          - revive
          - usetesting
          - wrapcheck
      - path: ^test/workloads/
        linters:
          - wrapcheck
      - path: ^internal/sim/
        linters:
          - wrapcheck
      - path: ^cmd/entire/cli/review/tui_model\.go$
        linters:
          - ireturn
      - path: ^cmd/entire/cli/investigate/cmd\.go$
        linters:
          - ireturn
      # configloader.go is a thin os-backed billy.Basic adapter. It must return
      # raw os errors unwrapped so go-git's os.IsNotExist() fall-through (for
      # absent config files) keeps working; wrapping would break it.
      - path: ^cmd/entire/cli/checkpoint/configloader\.go$
        linters:
          - wrapcheck
      - text: "`strat` is a misspelling"
        linters:
          - misspell
