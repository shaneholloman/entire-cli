# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
version: 2
pro: true

before:
  hooks:
    - go mod tidy
    - mise run completions

builds:
  - main: ./cmd/entire
    binary: entire
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/entireio/cli/cmd/entire/cli/versioninfo.Version={{.Version}}
      - -X github.com/entireio/cli/cmd/entire/cli/versioninfo.Commit={{.ShortCommit}}
      - -X github.com/entireio/cli/cmd/entire/cli/telemetry.PostHogAPIKey={{.Env.POSTHOG_API_KEY}}
      - -X github.com/entireio/cli/cmd/entire/cli/telemetry.PostHogEndpoint={{.Env.POSTHOG_ENDPOINT}}

notarize:
  macos:
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true # do not let an unusable binary slip into the wild

archives:
  - formats:
      - tar.gz
    name_template: "entire_{{ .Os }}_{{ .Arch }}"
    files:
      - src: completions/*
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: LICENSE
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: README.md
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
  ai:
    use: anthropic
    model: claude-sonnet-4-6
    prompt: |
      Write release notes for the Entire CLI based on the commit list below.
      Group changes into these sections (using ### headings): Added, Changed, Fixed, Docs, Housekeeping.
      Omit empty sections. Use bullet points. Do not use emojis.
      Do not start bullets with the section verb (e.g., don't write "Added X" under Added or "Fixed Y" under Fixed — the heading already provides context).
      Keep each bullet to one sentence. Preserve PR links from the original commits.
      Every bullet must include a PR link if one exists in the source commits.
      Consolidate related commits into a single bullet when they address the same feature or fix.

      {{ .ReleaseNotes }}

homebrew_casks:
  - name: entire
    repository:
      owner: entireio
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/entireio/cli"
    description: "CLI for Entire"
    binaries:
      - entire
    completions:
      bash: "completions/entire.bash"
      zsh: "completions/entire.zsh"
      fish: "completions/entire.fish"
