# yaml-language-server: $schema=https://goreleaser.com/static/schema-pro.json
version: 2
pro: true

before:
  hooks:
    - go mod tidy
    - mise run completions

builds:
  - id: entire
    main: ./cmd/entire
    binary: entire
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/entireio/cli/cmd/entire/cli/versioninfo.Version={{.Version}}
      - -X github.com/entireio/cli/cmd/entire/cli/versioninfo.Commit={{.ShortCommit}}
      - -X github.com/entireio/cli/cmd/entire/cli/telemetry.PostHogAPIKey={{.Env.POSTHOG_API_KEY}}
      - -X github.com/entireio/cli/cmd/entire/cli/telemetry.PostHogEndpoint={{.Env.POSTHOG_ENDPOINT}}

  # git-remote-entire is the git remote helper for entire:// URLs (see
  # cmd/git-remote-entire). A small, dedicated binary shipped alongside
  # entire so `git clone entire://…` resolves it on PATH — no telemetry,
  # only the versioninfo stamp it needs for its git agent string.
  - id: git-remote-entire
    main: ./cmd/git-remote-entire
    binary: git-remote-entire
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/entireio/cli/cmd/entire/cli/versioninfo.Version={{.Version}}
      - -X github.com/entireio/cli/cmd/entire/cli/versioninfo.Commit={{.ShortCommit}}

notarize:
  macos:
    # Must list every darwin build id explicitly. When omitted, goreleaser
    # defaults the id filter to the project name ("cli"), which matched the
    # old single unnamed build but matches neither named build above — the
    # notarize pipe then silently skips and ships ad-hoc-signed binaries that
    # Gatekeeper kills on launch.
    - enabled: '{{ isEnvSet "MACOS_SIGN_P12" }}'
      ids:
        - entire
        - git-remote-entire
      sign:
        certificate: "{{.Env.MACOS_SIGN_P12}}"
        password: "{{.Env.MACOS_SIGN_PASSWORD}}"
      notarize:
        issuer_id: "{{.Env.MACOS_NOTARY_ISSUER_ID}}"
        key_id: "{{.Env.MACOS_NOTARY_KEY_ID}}"
        key: "{{.Env.MACOS_NOTARY_KEY}}"
        wait: true # do not let an unusable binary slip into the wild

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "entire_{{ .Os }}_{{ .Arch }}"
    files:
      - src: completions/*
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: LICENSE
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"
      - src: README.md
        info:
          owner: root
          group: root
          mtime: "{{ .CommitDate }}"

checksum:
  name_template: "checksums.txt"

release:
  prerelease: auto

scoops:
  - repository:
      owner: entireio
      name: scoop-bucket
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/entireio/cli"
    description: "CLI for Entire"
    license: MIT
    skip_upload: auto

homebrew_casks:
  - name: entire
    repository:
      owner: entireio
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/entireio/cli"
    description: "CLI for Entire"
    binaries:
      - entire
      - git-remote-entire
    generate_completions_from_executable:
      executable: entire
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
    conflicts:
      - cask: entire@nightly
    skip_upload: auto

  - name: entire@nightly
    repository:
      owner: entireio
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/entireio/cli"
    description: "CLI for Entire (nightly build)"
    binaries:
      - entire
      - git-remote-entire
    generate_completions_from_executable:
      executable: entire
      shell_parameter_format: cobra
      shells:
        - bash
        - zsh
        - fish
    conflicts:
      - cask: entire
    skip_upload: "{{ if not .Prerelease }}true{{ end }}"

announce:
  discord:
    enabled: '{{ and (not .Prerelease) (isEnvSet "DISCORD_WEBHOOK_ID") (isEnvSet "DISCORD_WEBHOOK_TOKEN") }}'
    message_template: "Beep, boop. **Entire CLI {{ .Tag }}** is out!\n\n{{ .ReleaseURL }}\n\nSee https://docs.entire.io/cli/installation for help installing and updating."
    author: "Entire"
