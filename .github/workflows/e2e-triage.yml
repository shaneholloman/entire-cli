name: E2E Triage

on:
  workflow_dispatch:
    inputs:
      run_url:
        description: GitHub Actions run URL to triage
        required: true
        type: string
      sha:
        description: Commit SHA (auto-detected from run if omitted)
        required: false
        type: string
      failed_agents:
        description: Comma-separated list of failed agents (auto-detected from run if omitted)
        required: false
        type: string
      slack_channel:
        description: Slack channel ID for the originating thread
        required: false
        type: string
      slack_thread_ts:
        description: Slack thread timestamp for replies
        required: false
        type: string

permissions:
  actions: read
  contents: read

concurrency:
  group: e2e-triage-${{ inputs.run_url || github.run_id }}
  cancel-in-progress: true

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.set.outputs.agents }}
      run_url: ${{ steps.set.outputs.run_url }}
      sha: ${{ steps.set.outputs.sha }}
      slack_channel: ${{ steps.set.outputs.slack_channel }}
      slack_thread_ts: ${{ steps.set.outputs.slack_thread_ts }}
    steps:
      - name: Validate payload and build matrix
        id: set
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_NAME: ${{ github.repository }}
          RUN_URL_INPUT: ${{ inputs.run_url }}
          SHA_INPUT: ${{ inputs.sha }}
          FAILED_AGENTS_INPUT: ${{ inputs.failed_agents }}
          SLACK_CHANNEL_INPUT: ${{ inputs.slack_channel }}
          SLACK_THREAD_TS_INPUT: ${{ inputs.slack_thread_ts }}
        run: |
          set -euo pipefail

          csv_to_json() {
            printf '%s' "$1" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))'
          }

          run_url="$RUN_URL_INPUT"
          sha="${SHA_INPUT:-}"
          slack_channel="${SLACK_CHANNEL_INPUT:-}"
          slack_thread_ts="${SLACK_THREAD_TS_INPUT:-}"

          # Derive missing values from run URL via GitHub API
          if [ -z "$sha" ] || [ -z "$FAILED_AGENTS_INPUT" ]; then
            run_id=$(echo "$run_url" | grep -oE '/runs/[0-9]+' | grep -oE '[0-9]+')
            if [ -z "$run_id" ]; then
              echo "Could not extract run ID from run_url: $run_url" >&2
              exit 1
            fi
            run_data=$(gh run view "$run_id" --repo "$REPO_NAME" --json headSha,jobs)
            if [ -z "$sha" ]; then
              sha=$(echo "$run_data" | jq -r '.headSha')
            fi
            if [ -z "$FAILED_AGENTS_INPUT" ]; then
              agents_json=$(echo "$run_data" | jq -c '[.jobs[]
                | select(.conclusion == "failure")
                | (.name | (try capture("\\((?<agent>[^)]+)\\)").agent catch null))
                | select(. != null)
              ]')
            fi
          fi

          if [ -n "$FAILED_AGENTS_INPUT" ]; then
            agents_json="$(csv_to_json "$FAILED_AGENTS_INPUT")"
          fi

          if [ -z "$run_url" ]; then
            echo "run_url is required" >&2
            exit 1
          fi
          if [ -z "$sha" ]; then
            echo "sha is required" >&2
            exit 1
          fi
          if [ -z "$agents_json" ] || [ "$agents_json" = "[]" ] || [ "$agents_json" = "null" ]; then
            echo "agents is required (provide failed_agents input or ensure failed job names contain '(agent-name)')" >&2
            exit 1
          fi

          echo "run_url=$run_url" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "slack_channel=$slack_channel" >> "$GITHUB_OUTPUT"
          echo "slack_thread_ts=$slack_thread_ts" >> "$GITHUB_OUTPUT"
          echo "agents=$agents_json" >> "$GITHUB_OUTPUT"

  triage:
    needs: [matrix-setup]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RUN_URL: ${{ needs.matrix-setup.outputs.run_url }}
      E2E_AGENT: ${{ matrix.agent }}
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ needs.matrix-setup.outputs.slack_channel }}
      SLACK_THREAD_TS: ${{ needs.matrix-setup.outputs.slack_thread_ts }}
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.matrix-setup.outputs.agents) }}
    steps:
      - name: Write Slack helper
        if: ${{ env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL != '' && env.SLACK_THREAD_TS != '' }}
        shell: bash
        run: |
          set -euo pipefail

          helper="$RUNNER_TEMP/post-slack-message.sh"
          cat > "$helper" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          text="${1:?message is required}"
          payload="$(jq -n \
            --arg channel "$SLACK_CHANNEL" \
            --arg thread_ts "$SLACK_THREAD_TS" \
            --arg text "$text" \
            '{channel: $channel, thread_ts: $thread_ts, text: $text}')"

          if ! response="$(curl -fsS https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data "$payload")"; then
            echo "warning: slack notification failed" >&2
            exit 0
          fi

          if ! jq -e '.ok == true' >/dev/null <<<"$response"; then
            echo "warning: slack notification returned non-ok response" >&2
          fi
          EOF
          chmod +x "$helper"

      - name: Post triage started
        if: ${{ env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL != '' && env.SLACK_THREAD_TS != '' }}
        shell: bash
        run: |
          set -euo pipefail

          "$RUNNER_TEMP/post-slack-message.sh" "Starting E2E triage for \`$E2E_AGENT\` on <$RUN_URL|this run>."

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install Claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run triage
        id: triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          TRIAGE_OUTPUT_FILE: ${{ github.workspace }}/e2e-triage-artifacts/${{ matrix.agent }}/triage.log
          TRIAGE_SHA: ${{ needs.matrix-setup.outputs.sha }}
        run: scripts/run-e2e-triage.sh

      - name: Summarize triage output
        id: summary
        if: always()
        shell: bash
        env:
          TRIAGE_OUTPUT_FILE: ${{ github.workspace }}/e2e-triage-artifacts/${{ matrix.agent }}/triage.log
        run: |
          set -euo pipefail

          summary=""
          if [ -f "$TRIAGE_OUTPUT_FILE" ]; then
            summary="$(
              (grep '^## ' "$TRIAGE_OUTPUT_FILE" 2>/dev/null | head -n 3 | sed 's/^## //' | awk '
                NF {
                  if (out != "") {
                    out = out " | "
                  }
                  out = out $0
                }
                END {
                  print out
                }
              ') || true
            )"
          fi

          {
            echo 'summary<<EOF'
            printf '%s\n' "$summary"
            echo EOF
          } >> "$GITHUB_OUTPUT"

          # Print triage output to job summary
          {
            echo "## E2E Triage: ${E2E_AGENT}"
            echo ""
            if [ -f "$TRIAGE_OUTPUT_FILE" ] && [ -s "$TRIAGE_OUTPUT_FILE" ]; then
              sed 's/\x1b\[[0-9;]*[a-zA-Z]//g; s/\x1b\[[?][0-9]*[a-zA-Z]//g' "$TRIAGE_OUTPUT_FILE"
            else
              echo "No triage output was produced."
              echo ""
              echo "The triage log file was either not created or is empty."
              echo "Check the 'Run triage' step logs for details."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Post triage completion
        if: ${{ always() && (steps.triage.outcome == 'success' || steps.triage.outcome == 'failure') && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL != '' && env.SLACK_THREAD_TS != '' }}
        shell: bash
        env:
          TRIAGE_OUTCOME: ${{ steps.triage.outcome }}
          TRIAGE_SUMMARY: ${{ steps.summary.outputs.summary }}
        run: |
          set -euo pipefail

          if [ "$TRIAGE_OUTCOME" = "success" ]; then
            message="E2E triage complete for \`$E2E_AGENT\`."
          else
            message="E2E triage failed for \`$E2E_AGENT\`."
          fi
          if [ -n "$TRIAGE_SUMMARY" ]; then
            message="$message $TRIAGE_SUMMARY"
          fi

          "$RUNNER_TEMP/post-slack-message.sh" "$message"

      - name: Upload triage output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-triage-${{ matrix.agent }}
          path: e2e-triage-artifacts/
          retention-days: 7
