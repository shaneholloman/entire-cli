name: E2E Triage

on:
  repository_dispatch:
    types:
      - slack_e2e_triage_requested
  workflow_dispatch:
    inputs:
      run_url:
        description: GitHub Actions run URL to triage
        required: true
        type: string
      sha:
        description: Commit SHA that failed
        required: true
        type: string
      failed_agents:
        description: Comma-separated list of failed agents
        required: true
        type: string
      slack_channel:
        description: Slack channel ID for the originating thread
        required: false
        type: string
      slack_thread_ts:
        description: Slack thread timestamp for replies
        required: false
        type: string

permissions:
  actions: read
  contents: read

jobs:
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.set.outputs.agents }}
      run_url: ${{ steps.set.outputs.run_url }}
      sha: ${{ steps.set.outputs.sha }}
      slack_channel: ${{ steps.set.outputs.slack_channel }}
      slack_thread_ts: ${{ steps.set.outputs.slack_thread_ts }}
    steps:
      - name: Validate payload and build matrix
        id: set
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REPO_NAME: ${{ github.repository }}
          RUN_URL_INPUT: ${{ inputs.run_url }}
          SHA_INPUT: ${{ inputs.sha }}
          FAILED_AGENTS_INPUT: ${{ inputs.failed_agents }}
          SLACK_CHANNEL_INPUT: ${{ inputs.slack_channel }}
          SLACK_THREAD_TS_INPUT: ${{ inputs.slack_thread_ts }}
        run: |
          set -euo pipefail

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            run_url="$RUN_URL_INPUT"
            sha="$SHA_INPUT"
            slack_channel="${SLACK_CHANNEL_INPUT:-}"
            slack_thread_ts="${SLACK_THREAD_TS_INPUT:-}"
            failed_agents_raw="$FAILED_AGENTS_INPUT"
            agents_json="$(printf '%s' "$failed_agents_raw" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')"
          else
            trigger_text="$(jq -r '.client_payload.trigger_text // empty' "$GITHUB_EVENT_PATH")"
            repo="$(jq -r '.client_payload.repo // empty' "$GITHUB_EVENT_PATH")"
            branch="$(jq -r '.client_payload.branch // empty' "$GITHUB_EVENT_PATH")"
            run_url="$(jq -r '.client_payload.run_url // empty' "$GITHUB_EVENT_PATH")"
            sha="$(jq -r '.client_payload.sha // empty' "$GITHUB_EVENT_PATH")"
            slack_channel="$(jq -r '.client_payload.slack_channel // empty' "$GITHUB_EVENT_PATH")"
            slack_thread_ts="$(jq -r '.client_payload.slack_thread_ts // empty' "$GITHUB_EVENT_PATH")"
            if jq -e '.client_payload.failed_agents | type == "array"' "$GITHUB_EVENT_PATH" >/dev/null 2>&1; then
              agents_json="$(jq -c '.client_payload.failed_agents' "$GITHUB_EVENT_PATH")"
            else
              failed_agents_raw="$(jq -r '.client_payload.failed_agents // empty' "$GITHUB_EVENT_PATH")"
              agents_json="$(printf '%s' "$failed_agents_raw" | jq -R -s -c 'split(",") | map(gsub("^\\s+|\\s+$"; "")) | map(select(length > 0))')"
            fi

            if [ "$trigger_text" != "triage e2e" ]; then
              echo "trigger_text must be exactly 'triage e2e'" >&2
              exit 1
            fi
            if [ "$repo" != "$REPO_NAME" ]; then
              echo "repo must match $REPO_NAME" >&2
              exit 1
            fi
            if [ "$branch" != "main" ]; then
              echo "branch must be main" >&2
              exit 1
            fi
          fi

          if [ -z "$run_url" ]; then
            echo "run_url is required" >&2
            exit 1
          fi
          if [ -z "$sha" ]; then
            echo "sha is required" >&2
            exit 1
          fi
          if [ -z "$agents_json" ] || [ "$agents_json" = "[]" ]; then
            echo "failed_agents is required" >&2
            exit 1
          fi

          echo "run_url=$run_url" >> "$GITHUB_OUTPUT"
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "slack_channel=$slack_channel" >> "$GITHUB_OUTPUT"
          echo "slack_thread_ts=$slack_thread_ts" >> "$GITHUB_OUTPUT"
          echo "agents=$agents_json" >> "$GITHUB_OUTPUT"

  triage:
    needs: [matrix-setup]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL: ${{ needs.matrix-setup.outputs.slack_channel }}
      SLACK_THREAD_TS: ${{ needs.matrix-setup.outputs.slack_thread_ts }}
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.matrix-setup.outputs.agents) }}
    steps:
      - name: Post triage started
        if: ${{ env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL != '' && env.SLACK_THREAD_TS != '' }}
        shell: bash
        env:
          RUN_URL: ${{ needs.matrix-setup.outputs.run_url }}
        run: |
          set -euo pipefail

          post_slack_message() {
            local text="$1"
            local payload response

            payload="$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "$SLACK_THREAD_TS" \
              --arg text "$text" \
              '{channel: $channel, thread_ts: $thread_ts, text: $text}')"

            if ! response="$(curl -fsS https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H 'Content-type: application/json; charset=utf-8' \
              --data "$payload")"; then
              echo "warning: slack start notification failed" >&2
              return 0
            fi

            if ! jq -e '.ok == true' >/dev/null <<<"$response"; then
              echo "warning: slack start notification returned non-ok response" >&2
            fi
          }

          post_slack_message "Starting E2E triage for \`$E2E_AGENT\` on <$RUN_URL|this run>."

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.matrix-setup.outputs.sha }}
          fetch-depth: 0

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install Claude CLI
        run: |
          curl -fsSL https://claude.ai/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run triage
        id: triage
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ needs.matrix-setup.outputs.run_url }}
          E2E_AGENT: ${{ matrix.agent }}
          TRIAGE_OUTPUT_FILE: ${{ github.workspace }}/e2e-triage-artifacts/${{ matrix.agent }}/triage.log
        run: scripts/run-e2e-triage.sh

      - name: Summarize triage output
        id: summary
        if: always()
        shell: bash
        env:
          TRIAGE_OUTPUT_FILE: ${{ github.workspace }}/e2e-triage-artifacts/${{ matrix.agent }}/triage.log
        run: |
          set -euo pipefail

          summary=""
          if [ -f "$TRIAGE_OUTPUT_FILE" ]; then
            summary="$(
              (grep '^## ' "$TRIAGE_OUTPUT_FILE" 2>/dev/null | head -n 3 | sed 's/^## //' | awk '
                NF {
                  if (out != "") {
                    out = out " | "
                  }
                  out = out $0
                }
                END {
                  print out
                }
              ') || true
            )"
          fi

          {
            echo 'summary<<EOF'
            printf '%s\n' "$summary"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Post triage success
        if: ${{ always() && steps.triage.outcome == 'success' && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL != '' && env.SLACK_THREAD_TS != '' }}
        shell: bash
        env:
          TRIAGE_SUMMARY: ${{ steps.summary.outputs.summary }}
        run: |
          set -euo pipefail

          post_slack_message() {
            local text="$1"
            local payload response

            payload="$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "$SLACK_THREAD_TS" \
              --arg text "$text" \
              '{channel: $channel, thread_ts: $thread_ts, text: $text}')"

            if ! response="$(curl -fsS https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H 'Content-type: application/json; charset=utf-8' \
              --data "$payload")"; then
              echo "warning: slack success notification failed" >&2
              return 0
            fi

            if ! jq -e '.ok == true' >/dev/null <<<"$response"; then
              echo "warning: slack success notification returned non-ok response" >&2
            fi
          }

          message="E2E triage complete for \`$E2E_AGENT\`."
          if [ -n "$TRIAGE_SUMMARY" ]; then
            message="$message $TRIAGE_SUMMARY"
          fi

          post_slack_message "$message"

      - name: Post triage failure
        if: ${{ always() && steps.triage.outcome == 'failure' && env.SLACK_BOT_TOKEN != '' && env.SLACK_CHANNEL != '' && env.SLACK_THREAD_TS != '' }}
        shell: bash
        env:
          TRIAGE_SUMMARY: ${{ steps.summary.outputs.summary }}
        run: |
          set -euo pipefail

          post_slack_message() {
            local text="$1"
            local payload response

            payload="$(jq -n \
              --arg channel "$SLACK_CHANNEL" \
              --arg thread_ts "$SLACK_THREAD_TS" \
              --arg text "$text" \
              '{channel: $channel, thread_ts: $thread_ts, text: $text}')"

            if ! response="$(curl -fsS https://slack.com/api/chat.postMessage \
              -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
              -H 'Content-type: application/json; charset=utf-8' \
              --data "$payload")"; then
              echo "warning: slack failure notification failed" >&2
              return 0
            fi

            if ! jq -e '.ok == true' >/dev/null <<<"$response"; then
              echo "warning: slack failure notification returned non-ok response" >&2
            fi
          }

          message="E2E triage failed for \`$E2E_AGENT\`."
          if [ -n "$TRIAGE_SUMMARY" ]; then
            message="$message $TRIAGE_SUMMARY"
          fi

          post_slack_message "$message"

      - name: Upload triage output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-triage-${{ matrix.agent }}
          path: e2e-triage-artifacts/
          retention-days: 7
