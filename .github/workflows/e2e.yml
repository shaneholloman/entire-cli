name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      agent:
        description: 'Run a single agent (leave empty for all)'
        required: false
        type: choice
        options:
          - ''
          - claude-code
          - opencode
          - gemini-cli
          - factoryai-droid
          - cursor-cli
          - copilot-cli
          - roger-roger
  push:
    branches:
      - main

permissions:
  actions: read
  contents: read

# Concurrency: only one E2E job runs at a time
concurrency:
  group: e2e-tests
  cancel-in-progress: true

jobs:
  # Build the matrix dynamically so workflow_dispatch can select a single agent.
  matrix-setup:
    runs-on: ubuntu-latest
    outputs:
      agents: ${{ steps.set.outputs.agents }}
    steps:
      - id: set
        run: |
          input="${{ github.event.inputs.agent }}"
          if [ -n "$input" ]; then
            echo "agents=[\"$input\"]" >> "$GITHUB_OUTPUT"
          else
            echo 'agents=["claude-code","opencode","gemini-cli","factoryai-droid","cursor-cli","copilot-cli","roger-roger"]' >> "$GITHUB_OUTPUT"
          fi

  e2e-tests:
    needs: matrix-setup
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      fail-fast: false
      matrix:
        agent: ${{ fromJson(needs.matrix-setup.outputs.agents) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup mise
        uses: jdx/mise-action@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install agent CLI
        run: |
          case "${{ matrix.agent }}" in
            claude-code) curl -fsSL https://claude.ai/install.sh | bash ;;
            opencode)    curl -fsSL https://opencode.ai/install | bash ;;
            gemini-cli)  npm install -g @google/gemini-cli ;;
            cursor-cli)  curl https://cursor.com/install -fsS | bash ;;
            factoryai-droid) curl -fsSL https://app.factory.ai/cli | sh ;;
            copilot-cli)  npm install -g @github/copilot  ;;
            roger-roger) ;; # installed by mise (see mise.toml)
          esac
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Verify roger-roger agent
        if: matrix.agent == 'roger-roger'
        run: |
          set -euo pipefail
          echo "Verifying roger-roger binaries on PATH..."
          command -v roger-roger
          command -v entire-agent-roger-roger

      - name: Bootstrap agent
        if: matrix.agent != 'roger-roger'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: go run ./e2e/bootstrap

      - name: Run E2E Tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          FACTORY_API_KEY: ${{ secrets.FACTORY_API_KEY }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          E2E_CONCURRENT_TEST_LIMIT: ${{ matrix.agent == 'gemini-cli' && '6' || matrix.agent == 'factoryai-droid' && '1' || '' }}
        run: mise run test:e2e --agent ${{ matrix.agent }} ${{ matrix.agent == 'roger-roger' && 'TestExternalAgent' || '' }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-artifacts-${{ matrix.agent }}
          path: e2e/artifacts/
          retention-days: 7

  notify-slack:
    runs-on: ubuntu-latest
    needs: [e2e-tests]
    if: ${{ always() && needs.e2e-tests.result == 'failure' && github.event_name == 'push' }}
    steps:
      - name: Get failed agents
        id: failed
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          failed=$(gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/jobs \
            --jq '[.jobs[]
              | select(.conclusion == "failure")
              | (.name | (try capture("\\((?<agent>[^)]+)\\)").agent catch null))
              | select(. != null)
            ] | join(", ")')
          failed_csv="${failed//, /,}"
          echo "agents=$failed" >> "$GITHUB_OUTPUT"
          echo "agents_csv=$failed_csv" >> "$GITHUB_OUTPUT"

      - name: Notify Slack of E2E failure
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.E2E_SLACK_CHANNEL }}
          FAILED_AGENTS: ${{ steps.failed.outputs.agents }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          COMMIT_URL: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          COMMIT_SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
        shell: bash
        run: |
          set -euo pipefail

          text=":red_circle: *E2E Tests Failed* on \`main\`

          Failed agents: *${FAILED_AGENTS}*
          <${RUN_URL}|View run details>
          Commit: <${COMMIT_URL}|${COMMIT_SHA}> by ${ACTOR}"

          payload="$(jq -n \
            --arg channel "$SLACK_CHANNEL" \
            --arg text "$text" \
            '{channel: $channel, text: $text}')"

          response="$(curl -fsS https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data "$payload")"

          if ! jq -e '.ok == true' >/dev/null <<<"$response"; then
            echo "::error::Slack API returned non-ok response: $(jq -r '.error // "unknown"' <<<"$response")"
            exit 1
          fi

          channel="$(jq -r '.channel' <<<"$response")"
          thread_ts="$(jq -r '.ts' <<<"$response")"

          triage_url="https://e2e-triage.entireio.workers.dev/triage?run_url=$(jq -rn --arg u "$RUN_URL" '$u | @uri')&slack_channel=${channel}&slack_thread_ts=${thread_ts}"

          followup="$(jq -n \
            --arg channel "$channel" \
            --arg thread_ts "$thread_ts" \
            --arg text ":mag: <${triage_url}|Run Triage>" \
            '{channel: $channel, thread_ts: $thread_ts, text: $text}')"

          curl -fsS https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H 'Content-type: application/json; charset=utf-8' \
            --data "$followup" > /dev/null
